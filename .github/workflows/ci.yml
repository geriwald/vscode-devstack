name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Typecheck
        run: npx tsc -p ./ --noEmit

      - name: Package VSIX
        run: npx @vscode/vsce package --allow-missing-repository

      - uses: actions/upload-artifact@v4
        with:
          name: devstack-vsix
          path: "*.vsix"
          if-no-files-found: error
